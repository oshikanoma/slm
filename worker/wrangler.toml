# Cloudflare Worker config for the Verifier search relay.
# Deploy:  cd worker && npx wrangler deploy
# Secret:  npx wrangler secret put TAVILY_API_KEY   (paste your tvly-... key)
name = "verifier-search"
main = "index.js"
compatibility_date = "2024-11-01"

# TAVILY_API_KEY is NOT stored here — it's a secret set via `wrangler secret put`
# so it never lands in the repo or the browser.
